report_comment: >
  This report has been generated by the <a href="https://github.com/ranlib/wastewater" target="_blank">ranlib/wastewater</a>
  analysis pipeline. For information about how to interpret these results, please see the
  <a href="https://github.com/ranlib/wastewater" target="_blank">documentation</a>.

data_format: "yaml"

max_table_rows: 10000

read_count_multiplier: 0.001
read_count_prefix: "K"
read_count_desc: "thousands"

kraken:
  top_n: 10

run_modules:
  - fastqc
  - fastp
  - bbduk
  - kraken
  - freyja
  - samtools
  - picard
  - mosdepth
  - qualimap
  
module_order:
  - fastqc:
      name: "PREPROCESS: FastQC"
      anchor: "fastqc"
      info: "FastQC results for raw reads."

  - fastp:
      name: "PREPROCESS: fastp"
      anchor: "fastp"   
      info: "Fastp results for adapter and quality trimming."

  - bbduk:
      name: "PREPROCESS: bbduk"
      anchor: "bbduk"   
      info: "BBduk results for primer removel."

  - kraken:
      name: "PREPROCESS: Kraken 2"
      info: "Kraken 2 classification results for reads after adapter and quality trimming with fastp."
     
  - qualimap:
      name: "BAM QC: qualimap"
      info: "WGS QC from qualimap."

  - samtools:
      name: "BAM QC: SAMTools"
      info: "SAMTools counts/statistics after mapping."

  - picard:
      name: "BAM QC: picard"
      info: "WGS QC from picard."
      
  - mosdepth:
      name: "BAM QC: mosdepth"
      info: "Genome-wide coverage metrics generated by mosdepth."

  - freyja:
      name: "VARIANTS: freyja"
      info: "Feyja variants"
